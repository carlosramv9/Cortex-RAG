services:
  api:
    build:
      context: .
      dockerfile: docker/Dockerfile
    container_name: knowledge-api
    env_file:
      - .env
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
      qdrant:
        condition: service_started
    volumes:
      - ./storage:/app/storage
    # host.docker.internal lets the container reach Ollama running on the host.
    extra_hosts:
      - "host.docker.internal:host-gateway"

  postgres:
    image: postgres:17-alpine
    container_name: knowledge-postgres
    environment:
      POSTGRES_USER: ${DB_USER:-knowledge}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-knowledge}
      POSTGRES_DB: ${DB_NAME:-knowledge}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-knowledge}"]
      interval: 5s
      timeout: 5s
      retries: 5

  qdrant:
    image: qdrant/qdrant:latest
    container_name: knowledge-qdrant
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant_data:/qdrant/storage

volumes:
  postgres_data:
  qdrant_data:
