services:
  api:
    build:
      context: .
      dockerfile: docker/Dockerfile
    container_name: knowledge-api
    env_file:
      - .env
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
      qdrant:
        condition: service_started
      rabbitmq:
        condition: service_healthy
    volumes:
      - ./storage:/app/storage
      # Persist the fastembed/HF model cache across rebuilds — /tmp is wiped
      # on every container recreation and the model download takes ~90s.
      - fastembed_cache:/tmp/fastembed_cache
    # host.docker.internal lets the container reach Ollama running on the host.
    extra_hosts:
      - "host.docker.internal:host-gateway"

  worker:
    build:
      context: .
      dockerfile: docker/Dockerfile
    container_name: knowledge-worker
    command: ["uv", "run", "python", "-m", "scripts.run_worker"]
    env_file:
      - .env
    depends_on:
      postgres:
        condition: service_healthy
      qdrant:
        condition: service_started
      rabbitmq:
        condition: service_healthy
    volumes:
      - ./storage:/app/storage
      - fastembed_cache:/tmp/fastembed_cache
    extra_hosts:
      - "host.docker.internal:host-gateway"

  postgres:
    image: postgres:17-alpine
    container_name: knowledge-postgres
    environment:
      POSTGRES_USER: ${DB_USER:-knowledge}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-knowledge}
      POSTGRES_DB: ${DB_NAME:-knowledge}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-knowledge}"]
      interval: 5s
      timeout: 5s
      retries: 5

  qdrant:
    image: qdrant/qdrant:latest
    container_name: knowledge-qdrant
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant_data:/qdrant/storage

  rabbitmq:
    image: rabbitmq:3-management-alpine
    container_name: knowledge-rabbitmq
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_USER:-guest}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_PASSWORD:-guest}
    ports:
      - "5672:5672"
      - "15672:15672" # management UI
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
  qdrant_data:
  rabbitmq_data:
  fastembed_cache:
